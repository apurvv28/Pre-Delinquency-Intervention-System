<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React + TS</title>
    <script>
      window.addEventListener('error', function(event) {
        document.body.innerHTML += '<div style="color: red; position: fixed; top: 0; left: 0; background: white; padding: 10px; z-index: 9999;">' + event.error.message + '<br/>' + event.error.stack + '</div>';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
